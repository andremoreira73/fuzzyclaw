{% extends "base.html" %}

{% block content %}

        <div class="bg-white rounded-xl shadow-md p-8 border border-gray-100{% block card_extra_class %}{% endblock card_extra_class %}">
            {% block card_content %}{% endblock card_content %}
        </div>
    </div>
</div>
{% endblock content %}
