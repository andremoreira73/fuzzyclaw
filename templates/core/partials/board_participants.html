{% comment %}
Autocomplete dropdown for @mentions on the message board.
Returned by the board_participants view.
{% endcomment %}

<div class="absolute bottom-full left-0 w-full bg-white border border-gray-200 rounded-lg shadow-lg mb-1 max-h-48 overflow-y-auto z-50">
  {% for p in participants %}
  <button type="button"
          data-id="{{ p.id }}"
          @click="insertMention('{{ p.id }}')"
          class="w-full text-left px-3 py-2 hover:bg-indigo-50 text-sm flex items-center justify-between transition-colors">
    <span class="font-mono text-gray-700">@{{ p.id }}</span>
    {% include "core/partials/status_badge.html" with status=p.status %}
  </button>
  {% endfor %}
  <button type="button"
          data-id="all"
          @click="insertMention('all')"
          class="w-full text-left px-3 py-2 hover:bg-indigo-50 text-sm border-t border-gray-100 transition-colors">
    <span class="font-mono text-gray-500">@all</span>
  </button>
</div>
