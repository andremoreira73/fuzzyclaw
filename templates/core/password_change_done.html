{% extends "base.html" %}
{% block title %}Password Changed — FuzzyClaw{% endblock title %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-md p-8 border border-gray-100 text-center">
            <div class="mb-4">
                <i class="fas fa-check-circle text-4xl text-green-500"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-4">Password Changed</h2>
            <p class="text-gray-600 mb-6">Your password has been changed successfully.</p>

            <a href="{% url 'core:profile' %}"
               class="inline-block px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200">
                <i class="fas fa-arrow-left mr-2"></i> Back to Profile
            </a>
        </div>
    </div>
</div>
{% endblock content %}
