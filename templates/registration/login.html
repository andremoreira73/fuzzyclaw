{% extends "base.html" %}
{% block title %}Login — FuzzyClaw{% endblock title %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-md p-8 border border-gray-100">
            <h1 class="text-2xl font-bold text-center mb-6 bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                Sign in to FuzzyClaw
            </h1>

            {% if form.errors %}
            <div class="mb-4 p-4 rounded-md bg-red-50 text-red-800 border border-red-200 text-sm">
                Invalid username or password.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="space-y-4">
                    <div>
                        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" name="username" id="id_username" autofocus required autocomplete="username"
                               class="w-full px-4 py-2 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200 transition-all duration-200">
                    </div>
                    <div>
                        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" name="password" id="id_password" required autocomplete="current-password"
                               class="w-full px-4 py-2 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200 transition-all duration-200">
                    </div>
                    <button type="submit"
                            class="w-full px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200">
                        Sign in
                    </button>
                </div>
                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
            </form>
        </div>
    </div>
</div>
{% endblock content %}
